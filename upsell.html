<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض إضافي - باور بانك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* نفس ستايل الصفحة الاولى */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#0f172a;color:white;}
.container{max-width:1200px;margin:auto;padding:50px 20px;}
h1{font-size:48px;margin-bottom:20px;}
.btn{background:#2563eb;color:white;padding:18px 35px;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-top:20px;}
.btn:hover{opacity:.9;}
.card{background:#1e293b;padding:25px;border-radius:20px;margin-bottom:20px;}
.product-img img{width:100%;border-radius:20px;box-shadow:0 20px 60px rgba(37,99,235,.4);}
</style>
</head>
<body>
<div class="container">
<h1>عرض خاص: باور بانك 10000mAh</h1>

<div class="card product-img">
<img src="https://images.unsplash.com/photo-1585995603413-eb35b5f4a50b?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Powerbank">
<p>اكمل مشترياتك مع باور بانك أصلي بسعر مميز!</p>
<p>السعر: 299 جنيه</p>
<button class="btn" id="addUpsellBtn">اضف إلى السلة وادفع الآن</button>
</div>
</div>

<script>
document.getElementById("addUpsellBtn").addEventListener("click",function(){
alert("تم إضافة باور بانك إلى السلة! سيتم تحويلك لصفحة الدفع.");
window.location.href = "checkout.html";
});
</script>
</body>
</html>
