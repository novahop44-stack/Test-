<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة الدفع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* نفس ستايل الصفحة الاولى */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#0f172a;color:white;}
.container{max-width:1200px;margin:auto;padding:50px 20px;}
h1{font-size:48px;margin-bottom:20px;}
input, select{padding:15px;border-radius:12px;border:none;margin-bottom:20px;width:100%;}
.btn{background:#22c55e;color:white;padding:18px 35px;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;width:100%;}
.btn:hover{opacity:.9;}
.card{background:#1e293b;padding:25px;border-radius:20px;margin-bottom:20px;}
</style>
</head>
<body>
<div class="container">
<h1>الدفع</h1>
<div class="card">
<h2>تفاصيل الدفع</h2>
<select>
<option>الدفع عند الاستلام</option>
<option>بطاقة فيزا / ماستركارد</option>
</select>
<input type="text" placeholder="الاسم الكامل">
<input type="text" placeholder="العنوان">
<input type="text" placeholder="رقم الهاتف">
<button class="btn" id="payBtn">إتمام الدفع</button>
</div>
</div>

<script>
document.getElementById("payBtn").addEventListener("click",function(){
alert("تمت عملية الدفع بنجاح! شكراً لك 😊");
// ممكن تحويله لصفحة شكراً او homepage
window.location.href = "index.html";
});
</script>
</body>
</html>
